<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    const path = window.location.pathname;
    const target = path === '/404.html' ? '/' : path;
    window.location.replace(target + window.location.search + window.location.hash);
  </script>
</head>
<body><p>リダイレクト中...</p></body>
</html>
